name = "mymail"
# name = "mail-exhibit"
main = "src/server.js"
compatibility_date = "2024-01-01"
keep_vars=true

# D1 数据库绑定
[[d1_databases]]
binding = "TEMP_MAIL_DB"
database_name = "maill_free_db" #你的d1数据库名称
database_id = "88a7c9c9-6c05-417d-9f5f-b6f642f5d5fb" # 你的database_id
# 登录会话过期时间（单位：天，默认7天）
# 环境变量
[vars]
# FORWARD_RULES="[{"prefix":"vip","email":"a@example.com"},{"prefix":"*","email":"example@qq.com"}]"
ADMIN_NAME="admin"
ADMIN_PASSWORD="200225"
GUEST_PASSWORD="guest"
JWT_TOKEN="dfvhluhdaslufhvdv"
JWT_TOKENGUEST_PASSWORD="dfsfsfxzcv"
SESSION_EXPIRE_DAYS="365"
MAIL_DOMAIN="zlinkw.shop"
RESEND_API_KEY="RESEND发件密钥"
SENDFLARE_API_KEY="SENDFLARE发件密钥"


# 静态资源目录（Workers + Assets）
[assets]
directory = "public"
# 显式指定绑定名，确保在 Worker 中通过 env.ASSETS 可用
binding = "ASSETS"


# R2 存储桶绑定（用于保存完整 EML 内容）
[[r2_buckets]]
binding = "MAIL_EML"
bucket_name = "mail-eml"

# wrangler.toml (wrangler v3.88.0^) 日志服务
# [observability.logs]
# enabled = true